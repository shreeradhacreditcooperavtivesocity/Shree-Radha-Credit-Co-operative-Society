<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRCCS Day Collections</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6fa;
}

.header{
  background:#0d47a1;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
}

.filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

input,button{
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#0d47a1;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

/* 🔵 Loader */
.loader-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.loader{
  border:6px solid #f3f3f3;
  border-top:6px solid #0d47a1;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-top:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  text-align:center;
}

.value{
  font-size:18px;
  font-weight:bold;
  margin-top:5px;
}

.credit{color:green;}
.debit{color:red;}
.net{color:#0d47a1;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:6px;
  font-size:13px;
}

th{
  background:#0d47a1;
  color:white;
}

.error{
  color:red;
  margin-top:10px;
  font-size:14px;
}

@media print{
  .filters, .error{
    display:none;
  }
}
</style>
</head>

<body>

<div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div>

<div class="header">
🏦 SRCCS Day Collection Dashboard
</div>

<div class="container">

<div class="filters">
  <input type="date" id="fromDate">
  <input type="date" id="toDate">
  <input type="text" id="agentId" placeholder="Agent ID">
  <button id="searchBtn" onclick="loadData()">Search</button>
  <button onclick="window.print()">Print</button>
</div>

<div class="grid">
  <div class="card">
    Total Credit
    <div class="value credit" id="totalCredit">0</div>
  </div>
  <div class="card">
    Total Debit
    <div class="value debit" id="totalDebit">0</div>
  </div>
  <div class="card">
    Net Collection
    <div class="value net" id="netCollection">0</div>
  </div>
  <div class="card">
    Transactions
    <div class="value" id="txnCount">0</div>
  </div>
</div>

<div class="error" id="errorBox"></div>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Account</th>
      <th>Name</th>
      <th>Agent</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Balance</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLbKk97p6xcbNyisXq2kT9i6-mVWF4sl6JQA56OETSjYvtw6aXuMoUPmsUEQXGq0ypTw/exec";
const BASE_URL = SCRIPT_URL + "?fn=txnList";

async function loadData(){

  const loader = document.getElementById("loader");
  const btn = document.getElementById("searchBtn");

  loader.style.display = "flex";
  btn.disabled = true;
  btn.innerText = "Loading...";

  document.getElementById("errorBox").innerText = "";

  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;
  const agent = document.getElementById("agentId").value;

  const url = BASE_URL +
              "&from=" + encodeURIComponent(from) +
              "&to=" + encodeURIComponent(to) +
              "&agent=" + encodeURIComponent(agent);

  try{

    const res = await fetch(url);
    if(!res.ok) throw new Error("Server not responding");

    const data = await res.json();
    if(!data.success) throw new Error("API returned error");

    let totalCredit = 0;
    let totalDebit = 0;

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.transactions.forEach(txn=>{

      if(txn.type === "credit")
        totalCredit += Number(txn.amount);
      else
        totalDebit += Number(txn.amount);

      tbody.innerHTML += `
        <tr>
          <td>${txn.postDate}</td>
          <td>${txn.account}</td>
          <td>${txn.name}</td>
          <td>${txn.agent}</td>
          <td>${txn.type}</td>
          <td>₹ ${txn.amount}</td>
          <td>₹ ${txn.balance}</td>
        </tr>
      `;
    });

    document.getElementById("totalCredit").innerText =
      totalCredit.toLocaleString();

    document.getElementById("totalDebit").innerText =
      totalDebit.toLocaleString();

    document.getElementById("netCollection").innerText =
      (totalCredit-totalDebit).toLocaleString();

    document.getElementById("txnCount").innerText =
      data.transactions.length;

  }catch(err){
    document.getElementById("errorBox").innerText =
      "Connection Error: " + err.message;
  }

  loader.style.display = "none";
  btn.disabled = false;
  btn.innerText = "Search";
}

</script>
</body>
</html>
