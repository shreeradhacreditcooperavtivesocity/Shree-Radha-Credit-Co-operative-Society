<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>SRCCS – Password Setup</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --primary:#1a237e;
  --primary-dark:#0d154f;
  --border:#c5cae9;
  --bg:#eef2f7;
  --card:#ffffff;
  --label:#e8eaf6;
  --text:#111827;
  --success:#2e7d32;
  --danger:#c62828;
}

/* BASE */
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
}

.app{
  max-width:420px;
  margin:40px auto;
  padding:15px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:22px;
}

/* HEADER */
h2{
  text-align:center;
  margin:0 0 18px;
  font-size:16px;
  font-weight:700;
  color:var(--primary);
  border-bottom:2px solid var(--primary);
  padding-bottom:8px;
}

/* FORM */
label{
  font-size:12px;
  font-weight:bold;
  margin-top:14px;
  display:block;
  color:var(--primary);
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
  font-size:13px;
  border:1px solid var(--border);
  background:#fff;
}

input:focus{
  border:1px solid var(--primary);
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  margin-top:20px;
  padding:10px;
  font-size:14px;
  font-weight:bold;
  border:none;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:var(--primary-dark);
}

/* MESSAGE */
.msg{
  margin-top:14px;
  text-align:center;
  font-size:13px;
  font-weight:bold;
}

.success{color:var(--success)}
.error{color:var(--danger)}

.name-box{
  margin-top:8px;
  font-size:13px;
  font-weight:bold;
}

/* PRINT */
@media print{
  body{background:#fff}
  .card{border:none}
  button{display:none}
}
</style>
</head>

<body>

<div class="app">
  <div class="card">

    <h2>Create / Update Password</h2>

    <label>Account Number</label>
    <input id="account" placeholder="SRC1234" onblur="fetchName()">

    <div id="custName" class="name-box"></div>

    <label>New Password</label>
    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="savePassword()">SAVE PASSWORD</button>

    <div id="msg" class="msg"></div>

  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyDDu4WqYctvGq9QeZAHENHT2nP8LSEef0eR_2gbmRgE8zMUtlqOORYX6gdCfY_ezmhVA/exec";

function fetchName(){
  const acc = account.value.trim();
  custName.innerHTML="";
  msg.innerHTML="";

  if(acc==="") return;

  fetch(`${API}?fn=getName&account=${encodeURIComponent(acc)}`)
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      custName.innerHTML = "Customer Name: " + d.name;
      custName.style.color="#1a237e";
    }else{
      custName.innerHTML = "Account Number Not Found";
      custName.style.color="#c62828";
    }
  })
  .catch(()=>{
    custName.innerHTML="Server Error";
    custName.style.color="#c62828";
  });
}

function savePassword(){
  msg.className="msg";
  msg.innerHTML="Saving...";

  if(custName.innerHTML===""){
    msg.innerHTML="Please enter valid account number";
    msg.className="msg error";
    return;
  }

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"savePassword",
      account:account.value.trim(),
      password:password.value.trim()
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      msg.innerHTML=d.message;
      msg.className="msg success";
    }else{
      msg.innerHTML=d.message;
      msg.className="msg error";
    }
  })
  .catch(()=>{
    msg.innerHTML="Server Error";
    msg.className="msg error";
  });
}
</script>

</body>
</html>
