<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SRCCS — Agent Daily/Monthly Saving Form (Online)</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<style>
  @page{ size:A4; margin:10mm; }

:root{
  --primary:#1a237e;
  --primary-dark:#0d154f;
  --accent:#0ea5a4;
  --bg:#eef2f7;
  --card:#ffffff;
  --border:#c5cae9;
  --text:#111827;
  --muted:#6b7280;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Segoe UI","Inter",Arial,sans-serif;
}

/* LAYOUT */
.wrap{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:420px 1fr;
  gap:18px;
  align-items:start;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  box-shadow:0 8px 18px rgba(0,0,0,.06);
  padding:18px;
}

/* HEADINGS */
h2{
  background:linear-gradient(90deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:10px 14px;
  font-size:15px;
  margin:0 0 14px;
  letter-spacing:.4px;
}

/* LABEL */
label{
  font-size:12px;
  color:var(--primary);
  font-weight:600;
  margin-bottom:4px;
  display:block;
}

/* INPUT */
input, select{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--border);
  font-size:13px;
  background:#fff;
  transition:.2s;
}

input:focus, select:focus{
  border-color:var(--primary);
  outline:none;
}

/* ROW */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.col{ flex:1; }

/* BUTTON */
button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:8px 14px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:var(--primary-dark);
}

button.secondary{
  background:var(--accent);
}

button.gray{
  background:#6b7280;
}

/* TOTAL BOX */
.total-box{
  background:#f4f6fb;
  border:1px solid var(--border);
  padding:10px;
  text-align:center;
  font-weight:700;
  font-size:15px;
  color:var(--primary);
  margin-bottom:14px;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:8px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.controls input{ flex:1; }

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:8px 6px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

th{
  background:#eef2ff;
  color:var(--primary);
  font-weight:700;
  position:sticky;
  top:0;
  z-index:5;
}

tfoot td{
  background:#f4f6fb;
}

.norec{
  padding:14px;
  color:var(--muted);
  text-align:center;
  font-style:italic;
}

/* SUCCESS */
#successMsg{
  color:#2e7d32;
  font-weight:700;
  margin-top:8px;
  display:none;
}

/* RESPONSIVE */
@media(max-width:900px){
  .wrap{ grid-template-columns:1fr; }
}

</style>
</head>
<body>

<div class="wrap">
  <!-- Left: Form -->
  <div class="card">
    <h2>Deposit Entry</h2>
    <div class="total-box" id="totalAmount">Total: ₹ —</div>

    <form id="savingForm">
      <div class="row">
        <div class="col">
          <label>Agent Name</label>
          <input type="text" name="agentName" required>
        </div>
        <div class="col">
          <label>Agent ID</label>
          <input type="text" name="agentId" required>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Amount (₹)</label>
          <input type="number" name="amount" required>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Office / Operator Name</label>
          <input type="text" name="operatorName" required>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <button type="submit">💾 Submit</button>
        <button type="button" id="printBtn" class="secondary">🖨️ PDF</button>
        <button type="button" id="showAllBtn" class="gray">📋 Show All</button>
      </div>

      <div id="successMsg">✅ सफलतापूर्वक सबमिट किया गया!</div>
      <div id="qrcode" style="margin-top:10px;"></div>
    </form>
  </div>

  <!-- Right: Data Table -->
  <div class="card" id="printArea">
    <h2>Agent Collection Records</h2>

    <div class="controls">
      <input id="searchInput" placeholder="Search Agent Name / ID">
      <input id="fromDate" type="date">
      <input id="toDate" type="date">
      <button id="filterBtn" class="secondary">🔍 Filter</button>
      <button id="clearFilter" class="gray">Clear</button>
    </div>

    <div style="max-height:600px;overflow:auto;">
      <table id="resultsTable" aria-describedby="noRecords">
        <thead>
          <tr>
            <th>Date & Time</th>
            <th>Agent Name</th>
            <th>Agent ID</th>
            <th>Amount (₹)</th>
            <th>Operator</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td colspan="3" style="text-align:right;font-weight:700;">Page Total:</td>
            <td id="pageTotal" style="font-weight:700;">₹ 0</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <div id="noRecords" class="norec">No records found.</div>
    </div>
  </div>
</div>

<div style="text-align:center;padding:10px;color:var(--muted);font-size:12px;">
  © SRCCS — Agent Collection · Powered by Google Sheets
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJJEV2lMSJbKOfoz0tpnftxIePjvinFwX6pI1zIS0IjsTbQz9SN8Sb0GLkDwze8MpO/exec";
const $ = s => document.querySelector(s);
const form = $('#savingForm');
const resultsTbody = $('#resultsTable tbody');
const totalAmountBox = $('#totalAmount');
const pageTotalEl = $('#pageTotal');
const noRecordsEl = $('#noRecords');

/** Helper to safely get field (handles different header name variants) */
function getField(obj, candidates){
  if(!obj) return "";
  for(const k of candidates){
    if(Object.prototype.hasOwnProperty.call(obj,k) && obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== ""){
      return String(obj[k]);
    }
    // try lowercase keys
    const lowerKey = Object.keys(obj).find(x=>x.toLowerCase().trim() === (k+'').toLowerCase().trim());
    if(lowerKey) return String(obj[lowerKey]===null? '': obj[lowerKey]);
  }
  return "";
}

/** Friendly date parse/format to India timezone */
function formatDateForDisplay(dateStr){
  if(!dateStr) return '-';
  // try parse
  let d = new Date(dateStr);
  if(isNaN(d.getTime())){
    // try treating as Excel serial or alternative formats - fallback to original string
    return dateStr;
  }
  try{
    return d.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
  }catch(e){
    return d.toString();
  }
}

async function loadEntries() {
  const name = $('#searchInput').value.trim();
  const from = $('#fromDate').value;
  const to = $('#toDate').value;
  let url = `${SCRIPT_URL}?action=list`;
  if (name || from || to)
    url = `${SCRIPT_URL}?action=filter&name=${encodeURIComponent(name)}&from=${from}&to=${to}`;
  try{
    const res = await fetch(url);
    const data = await res.json();
    renderTable(data.rows || []);
  }catch(err){
    console.error('Load entries error', err);
    renderTable([]);
  }
}

function renderTable(rows){
  resultsTbody.innerHTML = "";
  let total = 0;
  if(!rows || rows.length===0){
    noRecordsEl.style.display='block';
    pageTotalEl.textContent='₹ 0';
    return;
  }
  noRecordsEl.style.display='none';

  // iterate rows
  rows.forEach(r=>{
    // robust key lookup with fallbacks
    const dateVal = getField(r, ['Date & Time','Date','date','DateTime','Timestamp','DateTime']);
    const nameVal = getField(r, ['Agent Name','Name','agentname','agent name','agent']);
    const idVal = getField(r, ['Agent ID','AgentID','ID','Account Number','Agent Id','agent id']);
    const amtRaw = getField(r, ['Amount','amount','Amt','AMOUNT']);
    const opVal = getField(r, ['Office / Operator Name','Office','Operator','Operator Name','Office / Operator Name','Office/Operator','Office/Operator Name']);

    // parse amount number safely
    const amtNum = Number(String(amtRaw).replace(/[^0-9.-]+/g,'')) || 0;

    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${formatDateForDisplay(dateVal)}</td>
                    <td>${nameVal || '-'}</td>
                    <td>${idVal || '-'}</td>
                    <td>${amtNum ? amtNum.toLocaleString('en-IN') : '-'}</td>
                    <td>${opVal || '-'}</td>`;
    resultsTbody.appendChild(tr);
    total += amtNum;
  });

  pageTotalEl.textContent = `₹ ${total.toLocaleString('en-IN')}`;
}

form.addEventListener('submit', async e=>{
  e.preventDefault();
  const data = {
    "Agent Name": form.agentName.value.trim(),
    "Agent ID": form.agentId.value.trim(),
    "Amount": form.amount.value.trim(),
    "Office / Operator Name": form.operatorName.value.trim(),
    "Date & Time": new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})
  };
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(data)});
  }catch(e){
    // ignore network errors for no-cors
    console.warn('POST (no-cors) ignored', e);
  }
  form.reset();
  $('#successMsg').style.display='block';
  setTimeout(()=>$('#successMsg').style.display='none',2000);
  // refresh
  loadEntries(); loadTotal();
});

$('#filterBtn').onclick = ()=> loadEntries();
$('#clearFilter').onclick = ()=>{ $('#searchInput').value=''; $('#fromDate').value=''; $('#toDate').value=''; loadEntries(); };
$('#showAllBtn').onclick = ()=> loadEntries();

$('#printBtn').onclick = ()=>{
  const opt = {
    margin:0.4,
    filename:`Agent_Statement_${new Date().toISOString().slice(0,10)}.pdf`,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2},
    jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
  };
  html2pdf().set(opt).from(document.getElementById('printArea')).save();
};

async function loadTotal(){
  try{
    const res = await fetch(`${SCRIPT_URL}?action=total`);
    const data = await res.json();
    totalAmountBox.textContent = `Total: ₹ ${Number(data.total||0).toLocaleString('en-IN')}`;
  }catch(err){
    console.warn('total load failed', err);
    totalAmountBox.textContent = 'Total: ₹ —';
  }
}

loadTotal(); loadEntries();
</script>
</body>
</html>
