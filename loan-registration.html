
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>SRCCS – Loan Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@page{size:A4;margin:14mm}

:root{
  --primary:#1a237e;
  --primary-dark:#0d154f;
  --border:#c5cae9;
  --bg:#eef2f7;
  --card:#ffffff;
  --label:#e8eaf6;
  --text:#111827;
}

/* BASE */
body{
  font-family:Segoe UI, Arial, sans-serif;
  background:var(--bg);
  margin:0;
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:25px auto;
  background:var(--card);
  padding:25px;
  border:1px solid var(--border);
  box-shadow:0 8px 18px rgba(0,0,0,.06);
}

/* HEADER */
.header{
  text-align:center;
  border-bottom:3px solid var(--primary);
  padding-bottom:12px;
}

.header h1{
  margin:0;
  color:var(--primary);
  font-size:20px;
  font-weight:700;
}

.header p{
  margin:4px 0 0;
  font-weight:600;
}

/* SECTION */
.section{margin-top:22px}

.section-title{
  background:var(--primary);
  color:#fff;
  padding:7px 12px;
  font-weight:600;
  font-size:13px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:12px;
}

.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-1{grid-template-columns:1fr}

/* FORM */
label{
  font-size:12px;
  font-weight:600;
  color:var(--primary);
}

input,select,textarea{
  width:100%;
  padding:8px;
  font-size:13px;
  border:1px solid var(--border);
  background:#fff;
  transition:.2s;
}

input:focus,select:focus,textarea:focus{
  border-color:var(--primary);
  outline:none;
}

textarea{resize:none}

/* BUTTON */
button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:12px 30px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:var(--primary-dark);
}

/* FOOTER */
.footer{
  margin-top:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
}

.small{
  font-size:11px;
  color:#555;
}

/* PRINT */
@media print{
  body{background:#fff}
  .container{border:none;margin:0;box-shadow:none}
  button{display:none}
}
</style>

</head>

<body>
<div class="container">

<div class="header">
<h1>श्री राधा साख सहकारी संस्था मर्यादित</h1>
<p>Loan Registration Form</p>
</div>

<!-- SEARCH -->
<div class="section">
<div class="grid grid-2">
<div>
<label>Search (Loan ID / Account / Mobile)</label>
<input id="search">
</div>
<div style="align-self:end">
<button type="button" onclick="searchLoan()">SEARCH</button>
</div>
</div>
</div>

<form onsubmit="event.preventDefault();saveLoan();">

<!-- IDENTIFICATION -->
<div class="section">
<div class="section-title">Loan Identification</div>
<div class="grid">
<div><label>Loan ID</label><input id="loan_id" readonly></div>
<div><label>Society Account</label><input id="society_account"></div>
<div><label>Application Date</label><input type="date" id="app_date"></div>
</div>
</div>

<!-- PERSONAL -->
<div class="section">
<div class="section-title">Personal Details</div>
<div class="grid">
<div><label>Name</label><input id="applicant_name"></div>
<div><label>Father / Husband</label><input id="father_name"></div>
<div><label>Mother</label><input id="mother_name"></div>
<div><label>Gender</label>
<select id="gender"><option>Male</option><option>Female</option><option>Other</option></select>
</div>
<div><label>DOB</label><input type="date" id="dob"></div>
<div><label>Age</label><input id="age"></div>
<div><label>Marital</label>
<select id="marital"><option>Single</option><option>Married</option></select>
</div>
<div><label>Category</label>
<select id="category"><option>General</option><option>OBC</option><option>SC</option><option>ST</option></select>
</div>
</div>
</div>

<!-- CONTACT -->
<div class="section">
<div class="section-title">Contact</div>
<div class="grid">
<div><label>Mobile</label><input id="mobile"></div>
<div><label>Alt Mobile</label><input id="alt_mobile"></div>
<div><label>Email</label><input id="email"></div>
<div class="grid-1" style="grid-column:1/-1">
<label>Address</label><textarea id="address"></textarea>
</div>
<div><label>City</label><input id="city"></div>
<div><label>Pin</label><input id="pincode"></div>
</div>
</div>

<!-- IDENTITY -->
<div class="section">
<div class="section-title">Identity</div>
<div class="grid">
<div><label>Aadhaar</label><input id="aadhaar"></div>
<div><label>PAN</label><input id="pan"></div>
<div><label>Voter</label><input id="voter"></div>
<div><label>DL</label><input id="dl"></div>
</div>
</div>

<!-- DOCUMENT UPLOAD -->
<div class="section">
<div class="section-title">Document Uploads</div>
<div class="grid">
<div>
<label>ID Proof</label>
<input type="file" onchange="encode(this,'id_proof')">
<div class="small" id="id_proof_prev"></div>
</div>
<div>
<label>Income Proof</label>
<input type="file" onchange="encode(this,'income_proof')">
<div class="small" id="income_proof_prev"></div>
</div>
<div>
<label>Bank Passbook</label>
<input type="file" onchange="encode(this,'passbook')">
<div class="small" id="passbook_prev"></div>
</div>
</div>
</div>

<!-- EMPLOYMENT -->
<div class="section">
<div class="section-title">Employment</div>
<div class="grid">
<div><label>Occupation</label>
<select id="occupation"><option>Job</option><option>Business</option><option>Farmer</option><option>Labour</option><option>Other</option></select>
</div>
<div><label>Employer / Business</label><input id="business"></div>
<div><label>Monthly Income</label><input id="monthly_income"></div>
<div><label>Annual Income</label><input id="annual_income"></div>
</div>
</div>

<!-- LOAN -->
<div class="section">
<div class="section-title">Loan Details</div>
<div class="grid">
<div><label>Loan Type</label>
<select id="loan_type"><option>Personal</option><option>Business</option><option>Agriculture</option><option>Vehicle</option><option>Home</option></select>
</div>
<div><label>Amount</label><input id="loan_amount"></div>
<div><label>Purpose</label><input id="loan_purpose"></div>
<div><label>Tenure</label><input id="tenure"></div>
<div><label>Interest %</label><input id="interest"></div>
<div><label>Processing Fee</label><input id="processing_fee"></div>
</div>
</div>

<!-- BANK -->
<div class="section">
<div class="section-title">Bank</div>
<div class="grid">
<div><label>Account Holder</label><input id="bank_holder"></div>
<div><label>Bank Name</label><input id="bank_name"></div>
<div><label>Account No</label><input id="bank_account"></div>
<div><label>IFSC</label><input id="ifsc"></div>
<div><label>Branch</label><input id="branch"></div>
</div>
</div>

<!-- GUARANTOR -->
<div class="section">
<div class="section-title">Guarantor</div>
<div class="grid">
<div><label>Name</label><input id="g1_name"></div>
<div><label>Relation</label><input id="g1_relation"></div>
<div><label>Mobile</label><input id="g1_mobile"></div>
<div><label>Aadhaar</label><input id="g1_aadhaar"></div>
<div><label>PAN</label><input id="g1_pan"></div>
</div>
</div>

<!-- DECLARATION -->
<div class="section">
<div class="section-title">Declaration</div>
<div class="grid grid-2">
<div><label>Place</label><input id="place"></div>
<div><label>Date</label><input type="date" id="dec_date"></div>
</div>
</div>

<div class="footer">
<div>मैं घोषणा करता/करती हूँ कि दी गई जानकारी सत्य है।</div>
<button type="submit">SAVE LOAN</button>
</div>

</form>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyGEdhqMfixORWu6FGXWCdBhxoquLiGfL8vua3hnGmaWXeKeuVPcCsjec2VRXTFFkFAOw/exec";
let DOCS={};

function encode(i,k){
 const f=i.files[0]; if(!f) return;
 const r=new FileReader();
 r.onload=()=>{DOCS[k]=r.result;document.getElementById(k+"_prev").innerText="✔ Uploaded";};
 r.readAsDataURL(f);
}

function saveLoan(){
 fetch(API,{method:"POST",body:JSON.stringify({
  action:"save",
  society_account:society_account.value,
  applicant_name:applicant_name.value,
  father_name:father_name.value,
  mother_name:mother_name.value,
  gender:gender.value,
  dob:dob.value,
  age:age.value,
  marital:marital.value,
  category:category.value,
  mobile:mobile.value,
  alt_mobile:alt_mobile.value,
  email:email.value,
  address:address.value,
  city:city.value,
  pincode:pincode.value,
  aadhaar:aadhaar.value,
  pan:pan.value,
  voter:voter.value,
  dl:dl.value,
  occupation:occupation.value,
  business:business.value,
  monthly_income:monthly_income.value,
  annual_income:annual_income.value,
  loan_type:loan_type.value,
  loan_amount:loan_amount.value,
  loan_purpose:loan_purpose.value,
  tenure:tenure.value,
  interest:interest.value,
  processing_fee:processing_fee.value,
  bank_holder:bank_holder.value,
  bank_name:bank_name.value,
  bank_account:bank_account.value,
  ifsc:ifsc.value,
  branch:branch.value,
  g1_name:g1_name.value,
  g1_relation:g1_relation.value,
  g1_mobile:g1_mobile.value,
  g1_aadhaar:g1_aadhaar.value,
  g1_pan:g1_pan.value,
  place:place.value,
  dec_date:dec_date.value,
  id_proof:DOCS.id_proof||"",
  income_proof:DOCS.income_proof||"",
  passbook:DOCS.passbook||""
 })}).then(r=>r.json()).then(d=>{
  loan_id.value=d.loanId;
  alert("Loan Saved : "+d.loanId);
 });
}

function searchLoan(){
 fetch(API,{method:"POST",body:JSON.stringify({action:"search",query:search.value})})
 .then(r=>r.json()).then(d=>{
  if(!d.found){alert("Not Found");return;}
  const r=d.row;
  loan_id.value=r[1];
  society_account.value=r[2];
  applicant_name.value=r[3];
  father_name.value=r[4];
  mother_name.value=r[5];
  gender.value=r[6];
  dob.value=r[7];
  age.value=r[8];
  marital.value=r[9];
  category.value=r[10];
  mobile.value=r[11];
  alt_mobile.value=r[12];
  email.value=r[13];
  address.value=r[14];
  city.value=r[15];
  pincode.value=r[16];
  aadhaar.value=r[17];
  pan.value=r[18];
  voter.value=r[19];
  dl.value=r[20];
  occupation.value=r[21];
  business.value=r[22];
  monthly_income.value=r[23];
  annual_income.value=r[24];
  loan_type.value=r[25];
  loan_amount.value=r[26];
  loan_purpose.value=r[27];
  tenure.value=r[28];
  interest.value=r[29];
  processing_fee.value=r[30];
  bank_holder.value=r[31];
  bank_name.value=r[32];
  bank_account.value=r[33];
  ifsc.value=r[34];
  branch.value=r[35];
  g1_name.value=r[36];
  g1_relation.value=r[37];
  g1_mobile.value=r[38];
  g1_aadhaar.value=r[39];
  g1_pan.value=r[40];
  place.value=r[41];
  dec_date.value=r[42];
 });
}
</script>

</body>
</html>
